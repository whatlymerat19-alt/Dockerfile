
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScribe Studio</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .preview { width: 100%; max-width: 300px; height: 533px; border: 2px solid #333; margin: 20px auto; background: #111; position: relative; overflow: hidden; }
        .sombre { filter: brightness(0.4) contrast(1.4); }
        .cinema { filter: sepia(0.2) contrast(1.1); border-top: 30px solid #000; border-bottom: 30px solid #000; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin: 5px; width: 45%; }
        textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #333; margin-bottom: 10px; }
        .generate-btn { background: #600; font-weight: bold; width: 92%; }
    </style>
</head>
<body>
    <h1>OMNISCRIBE MASTER</h1>
    <textarea id="promptInput" placeholder="Entrez votre prompt ici..."></textarea>
    <div>
        <button onclick="setFilter('sombre')">SOMBRE</button>
        <button onclick="setFilter('cinema')">CINÉMA</button>
    </div>
    <div id="videoView" class="preview">
        <p style="margin-top: 250px; color: #444;">APERÇU VIDÉO</p>
    </div>
    <button class="generate-btn" onclick="start()">GÉNÉRER (MARCUS VOICE)</button>
    <script>
        function setFilter(f) { document.getElementById('videoView').className = 'preview ' + f; }
        function start() { alert("L'algorithme de montage est lancé...");
